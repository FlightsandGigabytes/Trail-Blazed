<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trail Blazed</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0510;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}
#gameCanvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 3px solid #ffd700;
  box-shadow: 0 0 40px rgba(255,215,0,0.4), 0 0 80px rgba(255,100,0,0.15);
  display: block;
}
#controls {
  color: #7a6a40;
  font: 10px 'Courier New', monospace;
  margin-top: 7px;
  letter-spacing: 1px;
  text-align: center;
}
</style>
</head>
<body>
<canvas id="gameCanvas" width="960" height="540"></canvas>
<div id="controls">ARROWS: Move/Jump &nbsp;|&nbsp; Z: Special Ability &nbsp;|&nbsp; 1-5: Switch Character &nbsp;|&nbsp; ENTER: Confirm</div>
<script>
// ═══════════════════════════════════════════════════════════════
//  T R A I L   B L A Z E D
//  An American Weekend Vacation — The Blaze Family vs. 1848
//  v1.0  |  HTML5 Canvas  |  Vanilla JS
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 960, H = 540;
const S = 3; // pixel-art scale factor

// ── COLOR PALETTE (SNES-plus) ──────────────────────────────────
const C = {
  sky0:'#0d1f5c', sky1:'#2a5fa8', skyH:'#e8a87c', sun:'#ffd700',
  dirt0:'#5c3a1a', dirt1:'#7a4f2a', dirt2:'#9e6b3e',
  grass0:'#4a8c3f', grass1:'#2d5a28',
  gold0:'#ffd700', gold1:'#e8a800', gold2:'#b87800',
  skin:'#f4c49e', skin2:'#d4916e',
  uiDark:'#0a0a18', uiBorder:'#ffd700',
  hp:'#e83232', hpG:'#32e832',
  white:'#ffffff', black:'#000000',
};

// ── INPUT ──────────────────────────────────────────────────────
const keys = {}, JP = {}, JR = {};
addEventListener('keydown', e => { if(!keys[e.code]) JP[e.code]=true; keys[e.code]=true; e.preventDefault(); });
addEventListener('keyup',   e => { JR[e.code]=true; delete keys[e.code]; });
function clearJP() { for(let k in JP) delete JP[k]; for(let k in JR) delete JR[k]; }

// ── UTILS ──────────────────────────────────────────────────────
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const rand  = (a,b)   => Math.random()*(b-a)+a;
const ri    = (a,b)   => Math.floor(rand(a,b+1));

function fx(x,y,w,h,col){ ctx.fillStyle=col; ctx.fillRect(Math.round(x),Math.round(y),w,h); }
function tx(str,x,y,sz,col,align='left'){
  ctx.save(); ctx.font=`bold ${sz}px "Courier New",monospace`;
  ctx.fillStyle=col; ctx.textAlign=align; ctx.fillText(str,x,y); ctx.restore();
}
function txs(str,x,y,sz,col,shd='#000',align='left'){
  tx(str,x+2,y+2,sz,shd,align); tx(str,x,y,sz,col,align);
}
function rectsHit(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// ── SCREEN SHAKE ───────────────────────────────────────────────
let shakeT=0, shakeI=0;
function shake(i,d){ shakeI=i; shakeT=d; }

// ── PARTICLES ─────────────────────────────────────────────────
let parts = [];
function burst(x,y,n,colors,spd=3,life=40){
  for(let i=0;i<n;i++){
    const a=rand(0,Math.PI*2), sp=rand(0.5,spd);
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-rand(0.5,2),
      col:colors[ri(0,colors.length-1)],life,ml:life,sz:rand(3,8)});
  }
}
function updateParts(){
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; p.sz*=0.97; });
}
function drawParts(){
  parts.forEach(p=>{
    ctx.globalAlpha=p.life/p.ml;
    fx(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz,p.col);
  });
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════════
//  SPRITE DRAWING  (pixel art, no external assets)
// ═══════════════════════════════════════════════════════════════

function drawCharacter(id,x,y,dir=1,frame=0){
  ctx.save();
  if(dir===-1){ ctx.translate(Math.round(x)+9*S,0); ctx.scale(-1,1); x=-9*S; }
  const leg=Math.sin(frame*0.3)*S;
  ({clark,ellen,rusty,audrey,marty})[id]?.(Math.round(x),Math.round(y),leg);
  ctx.restore();
}

function clark(x,y,leg){
  // hair
  fx(x+3*S,y,12*S,3*S,'#5c3a1a'); fx(x+2*S,y+S,2*S,S,'#5c3a1a'); fx(x+14*S,y+S,2*S,S,'#5c3a1a');
  // face
  fx(x+3*S,y+2*S,12*S,7*S,C.skin);
  fx(x+5*S,y+4*S,2*S,2*S,'#2a1a0a'); fx(x+11*S,y+4*S,2*S,2*S,'#2a1a0a'); // eyes
  fx(x+5*S,y+7*S,2*S,S,'#c47a6e'); fx(x+7*S,y+8*S,4*S,S,'#c47a6e'); fx(x+11*S,y+7*S,2*S,S,'#c47a6e'); // smile
  // body plaid
  fx(x+2*S,y+9*S,14*S,9*S,'#8b3a3a');
  [3,6,9,12].forEach(i=>fx(x+i*S,y+9*S,S,9*S,'#5a2a2a'));
  // apron
  fx(x+4*S,y+10*S,10*S,8*S,'#c8c8a0'); fx(x+6*S,y+12*S,2*S,4*S,'#a0a080');
  // tool belt
  fx(x+2*S,y+17*S,14*S,2*S,'#7a5a2a'); fx(x+12*S,y+17*S,3*S,2*S,C.gold0);
  // arms
  fx(x,y+9*S,3*S,9*S,'#8b3a3a'); fx(x+15*S,y+9*S,3*S,9*S,'#8b3a3a');
  fx(x,y+17*S,3*S,2*S,C.skin); fx(x+15*S,y+17*S,3*S,2*S,C.skin);
  // legs
  fx(x+2*S,y+19*S,6*S,7*S,'#3a4a6a'); fx(x+10*S,y+19*S,6*S,7*S,'#3a4a6a');
  fx(x+3*S,y+24*S+leg,4*S,4*S,'#2a3a5a'); fx(x+11*S,y+24*S-leg,4*S,4*S,'#2a3a5a');
  fx(x+2*S,y+27*S+leg,5*S,2*S,'#3a2a1a'); fx(x+11*S,y+27*S-leg,5*S,2*S,'#3a2a1a');
}

function ellen(x,y,leg){
  fx(x+3*S,y,12*S,4*S,'#8b4a2a'); fx(x+2*S,y+S,S,3*S,'#8b4a2a'); fx(x+15*S,y+S,S,3*S,'#8b4a2a');
  fx(x+6*S,y-2*S,6*S,3*S,'#8b4a2a'); // bun
  fx(x+3*S,y+3*S,12*S,6*S,C.skin);
  fx(x+5*S,y+5*S,2*S,2*S,'#2a5a8a'); fx(x+11*S,y+5*S,2*S,2*S,'#2a5a8a');
  fx(x+5*S,y+4*S,3*S,S,'#2a1a0a'); fx(x+11*S,y+4*S,3*S,S,'#2a1a0a'); // lashes
  fx(x+6*S,y+7*S,6*S,S,'#c47a6e');
  fx(x+2*S,y+9*S,14*S,9*S,'#4a6aa0'); fx(x+7*S,y+9*S,4*S,4*S,'#5a7ab0');
  fx(x+2*S,y+17*S,14*S,9*S,'#7a4a8a');
  [4,9,12].forEach(px=>fx(x+px*S,y+18*S,2*S,2*S,'#e87ab0')); // flowers
  fx(x,y+9*S,3*S,7*S,'#4a6aa0'); fx(x+15*S,y+9*S,3*S,7*S,'#4a6aa0');
  fx(x+15*S,y+13*S,4*S,3*S,'#d4b87a'); fx(x+16*S,y+14*S,2*S,S,'#7a5a3a'); // map
  fx(x+3*S,y+26*S,4*S,2*S,'#5a3a2a'); fx(x+11*S,y+26*S,4*S,2*S,'#5a3a2a');
}

function rusty(x,y,leg){
  fx(x+3*S,y,12*S,3*S,'#c83232'); fx(x+S,y+S,2*S,2*S,'#c83232'); // cap
  fx(x+3*S,y+3*S,12*S,6*S,C.skin);
  fx(x+5*S,y+5*S,2*S,2*S,'#2a6a2a'); fx(x+11*S,y+5*S,2*S,2*S,'#2a6a2a');
  fx(x+5*S,y+4*S,2*S,S,'#2a1a0a'); fx(x+11*S,y+4*S,2*S,S,'#2a1a0a');
  fx(x+5*S,y+7*S,8*S,S,'#c47a6e'); fx(x+7*S,y+8*S,2*S,S,'#fff'); fx(x+10*S,y+8*S,2*S,S,'#fff');
  fx(x+2*S,y+9*S,14*S,9*S,'#c83232');
  fx(x+6*S,y+10*S,6*S,7*S,'#e84242'); fx(x+7*S,y+11*S,4*S,5*S,'#fff'); fx(x+8*S,y+12*S,2*S,3*S,'#c83232');
  fx(x,y+9*S,3*S,8*S,'#c83232'); fx(x+15*S,y+9*S,3*S,8*S,'#c83232');
  fx(x,y+16*S,3*S,2*S,C.skin); fx(x+15*S,y+16*S,3*S,2*S,C.skin);
  fx(x+2*S,y+18*S,14*S,7*S,'#3232c8');
  fx(x+2*S,y+24*S+leg,5*S,3*S,'#f0f0f0'); fx(x+2*S,y+26*S+leg,5*S,S,'#c83232');
  fx(x+11*S,y+24*S-leg,5*S,3*S,'#f0f0f0'); fx(x+11*S,y+26*S-leg,5*S,S,'#c83232');
}

function audrey(x,y,leg){
  fx(x+3*S,y,12*S,4*S,'#2a1a0a');
  fx(x+2*S,y,2*S,12*S,'#2a1a0a'); fx(x+14*S,y,2*S,12*S,'#2a1a0a');
  fx(x+3*S,y,2*S,8*S,'#9a2a9a'); fx(x+13*S,y,2*S,8*S,'#2a9a9a');
  fx(x+3*S,y+3*S,12*S,6*S,C.skin);
  fx(x+5*S,y+5*S,2*S,2*S,'#9a2a5a'); fx(x+11*S,y+5*S,2*S,2*S,'#9a2a5a');
  fx(x+4*S,y+4*S,4*S,S,'#2a1a0a'); fx(x+10*S,y+4*S,4*S,S,'#2a1a0a');
  fx(x+6*S,y+7*S,6*S,2*S,'#e83264');
  fx(x+2*S,y+9*S,14*S,2*S,'#e83264'); fx(x+2*S,y+10*S,14*S,S,'#f4a832'); // scarf
  fx(x+2*S,y+11*S,14*S,7*S,'#2a2a4a');
  fx(x+4*S,y+12*S,3*S,3*S,'#9a2a9a'); fx(x+11*S,y+13*S,3*S,3*S,'#2a9a9a'); fx(x+7*S,y+14*S,4*S,2*S,'#f4a832');
  fx(x,y+9*S,3*S,9*S,'#2a2a4a'); fx(x+15*S,y+9*S,3*S,9*S,'#2a2a4a');
  fx(x-2*S,y+11*S,5*S,8*S,'#c8a050'); fx(x-S,y+8*S,2*S,4*S,'#a08040'); // ukulele
  fx(x+2*S,y+18*S,14*S,8*S,'#3a5a8a'); fx(x+8*S,y+18*S,2*S,8*S,'#2a4a7a');
  fx(x+2*S,y+25*S+leg,5*S,3*S,'#2a1a0a'); fx(x+11*S,y+25*S-leg,5*S,3*S,'#2a1a0a');
}

function marty(x,y,leg){
  fx(x+3*S,y,12*S,4*S,'#3a2a1a');
  fx(x+4*S,y+3*S,10*S,7*S,C.skin);
  // glasses
  fx(x+3*S,y+4*S,5*S,4*S,'#2a1a0a'); fx(x+10*S,y+4*S,5*S,4*S,'#2a1a0a');
  fx(x+4*S,y+5*S,3*S,2*S,'#7ad4ff'); fx(x+11*S,y+5*S,3*S,2*S,'#7ad4ff');
  fx(x+8*S,y+6*S,2*S,S,'#2a1a0a');
  fx(x+S,y+5*S,3*S,S,'#2a1a0a'); fx(x+14*S,y+5*S,3*S,S,'#2a1a0a'); // ear pieces
  fx(x+8*S,y+7*S,2*S,S,'#d4916e');
  fx(x+6*S,y+8*S,6*S,S,'#c47a6e');
  fx(x+2*S,y+10*S,14*S,8*S,'#4a8a4a');
  [6,8,10].forEach(i=>fx(x+i*S,y+12*S,S,S,C.gold0));
  [7,9,11].forEach(i=>fx(x+i*S,y+14*S,S,S,C.gold0)); // dna
  fx(x,y+10*S,3*S,7*S,'#4a8a4a'); fx(x+15*S,y+10*S,3*S,7*S,'#4a8a4a');
  fx(x+15*S,y+13*S,5*S,4*S,'#c8a050'); fx(x+16*S,y+14*S,3*S,2*S,'#2a1a0a'); // book
  fx(x+2*S,y+18*S,14*S,8*S,'#c8b87a'); fx(x+8*S,y+18*S,2*S,8*S,'#b8a86a');
  fx(x+3*S,y+25*S+leg,4*S,3*S,'#f0f0f0'); fx(x+11*S,y+25*S-leg,4*S,3*S,'#f0f0f0');
}

function drawLawnmower(x,y,frame){
  const sp=frame*0.2;
  // exhaust
  fx(x+5*S,y-3*S,3*S,4*S,'#888'); fx(x+4*S,y-7*S,5*S,5*S,'#aaa'); fx(x+5*S,y-11*S,4*S,5*S,'#ccc');
  // body
  fx(x,y+4*S,36*S,16*S,'#c83232'); fx(x+2*S,y+2*S,32*S,6*S,'#a82a2a');
  fx(x+4*S,y,12*S,4*S,'#8a2020');
  // seat & steering
  fx(x+18*S,y+2*S,12*S,5*S,'#4a3a2a'); fx(x+22*S,y,8*S,3*S,'#3a2a1a');
  // blade
  fx(x+8*S,y+18*S,16*S,2*S,'#aaa');
  // wheels
  drawWheel(x+5*S,y+19*S,sp); drawWheel(x+28*S,y+19*S,sp);
  // bandit rider
  const bx=x+17*S, by=y-13*S;
  fx(bx+2*S,by,8*S,3*S,'#2a1a0a'); fx(bx+S,by+S,10*S,S,'#2a1a0a');
  fx(bx+2*S,by+3*S,8*S,6*S,'#c87a50');
  fx(bx+3*S,by+5*S,2*S,2*S,'#2a1a0a'); fx(bx+7*S,by+5*S,2*S,2*S,'#2a1a0a');
  fx(bx+3*S,by+7*S,6*S,S,'#2a1a0a');
  fx(bx+S,by+8*S,S,S,'#7a3a3a'); // bandana
  fx(bx,by+9*S,12*S,5*S,'#5a2a2a');
}

function drawWheel(cx,cy,spin){
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(spin);
  fx(-4*S,-4*S,8*S,8*S,'#2a2a2a');
  fx(-S,-4*S,2*S,8*S,'#aaa'); fx(-4*S,-S,8*S,2*S,'#aaa');
  fx(-S,-S,2*S,2*S,'#1a1a1a');
  ctx.restore();
}

function drawDrone(x,y,frame){
  const hv=Math.sin(frame*0.1)*2;
  const ps=frame*0.4;
  // arms
  fx(x,y+hv+3*S,5*S,2*S,'#3a3a5a'); fx(x+15*S,y+hv+3*S,5*S,2*S,'#3a3a5a');
  fx(x+3*S,y+hv+S,5*S,2*S,'#3a3a5a'); fx(x+12*S,y+hv+S,5*S,2*S,'#3a3a5a');
  // props
  [[x+2*S,y+hv+S,ps],[x+18*S,y+hv+S,-ps],[x+5*S,y+hv+4*S,-ps],[x+15*S,y+hv+4*S,ps]].forEach(([px,py,ang])=>{
    ctx.save(); ctx.translate(px,py); ctx.rotate(ang);
    fx(-4*S,-S,8*S,2*S,'#8a8ab0'); ctx.restore();
  });
  // body
  fx(x+4*S,y+hv+2*S,12*S,6*S,'#4a4a6a'); fx(x+6*S,y+hv,8*S,4*S,'#6a6a8a');
  fx(x+8*S,y+hv+S,4*S,2*S,'#2a8ab0'); // camera
  // LEDs
  fx(x+5*S,y+hv+4*S,2*S,2*S, frame%20<10?'#f00':'#800');
  fx(x+13*S,y+hv+4*S,2*S,2*S, frame%20<10?'#f00':'#800');
}

function drawGoldNugget(x,y,frame){
  const b=Math.sin(frame*0.08)*2;
  fx(x+2*S,y+b,8*S,8*S,C.gold1);
  fx(x+3*S,y+S+b,6*S,6*S,C.gold0);
  fx(x+4*S,y+2*S+b,4*S,4*S,'#fffad0');
  if(frame%60<10){ fx(x+3*S,y+b-2*S,S,S,'#fff'); fx(x+4*S,y+b-3*S,S,S,'#fff'); }
}

function drawFood(x,y,type,frame){
  const b=Math.sin(frame*0.08+1)*2;
  if(type==='hotdog'){
    fx(x+S,y+3*S+b,10*S,5*S,'#d4905a'); fx(x+2*S,y+2*S+b,8*S,6*S,'#e8a870');
    fx(x+S,y+4*S+b,10*S,3*S,'#c84a32'); fx(x+2*S,y+4*S+b,8*S,S,'#f4d020');
  } else if(type==='cake'){
    fx(x+S,y+6*S+b,10*S,5*S,'#f4d090'); fx(x+2*S,y+3*S+b,8*S,4*S,'#e87ab0');
    fx(x+3*S,y+S+b,6*S,3*S,'#f0f0f0');
    fx(x+5*S,y-S+b,2*S,3*S,'#c83264'); fx(x+5*S,y-2*S+b,2*S,S,'#f4a832');
  } else {
    fx(x+2*S,y+2*S+b,8*S,9*S,'#e8c832'); fx(x+3*S,y+3*S+b,6*S,7*S,'#c8a820');
    fx(x+4*S,y+4*S+b,4*S,3*S,'#a88810');
  }
}

function drawWagon(x,y,frame){
  const wsp=frame*0.04;
  // canvas top
  fx(x+8*S,y,32*S,14*S,'#e8d8a0'); fx(x+6*S,y+S,36*S,12*S,'#f0e8b0');
  [0,1,2,3].forEach(i=>fx(x+10*S+i*8*S,y,3*S,14*S,'#c8b880'));
  // body
  fx(x+4*S,y+14*S,40*S,14*S,'#8b5a2a'); fx(x+5*S,y+15*S,38*S,12*S,'#7a4a1a');
  [0,1,2,3,4].forEach(i=>fx(x+5*S+i*8*S,y+15*S,2*S,12*S,'#6a3a0a'));
  // wheels
  drawWheelLg(x+10*S,y+26*S,wsp); drawWheelLg(x+38*S,y+26*S,wsp);
  // time machine glow
  const gl=0.25+Math.sin(Date.now()*0.005)*0.15;
  ctx.globalAlpha=gl; fx(x+18*S,y+5*S,12*S,8*S,'#7ad4ff'); ctx.globalAlpha=1;
  fx(x+20*S,y+7*S,8*S,6*S,'#4a8ab0'); fx(x+22*S,y+8*S,4*S,4*S,'#9af0ff');
}

function drawWheelLg(cx,cy,spin){
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(spin);
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2;
    fx(Math.cos(a)*8*S-S,Math.sin(a)*8*S-S,2*S,2*S,'#7a5a2a');
  }
  fx(-S,-8*S,2*S,16*S,'#5a3a1a'); fx(-8*S,-S,16*S,2*S,'#5a3a1a');
  fx(-2*S,-2*S,4*S,4*S,'#3a2a0a');
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
//  BACKGROUNDS
// ═══════════════════════════════════════════════════════════════

function drawSky(sx){
  const g=ctx.createLinearGradient(0,0,0,H*0.65);
  g.addColorStop(0,'#152a70'); g.addColorStop(0.5,'#2a5aa0');
  g.addColorStop(0.8,'#e8a06a'); g.addColorStop(1,'#f0c080');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H*0.65);
  // sun
  ctx.fillStyle=C.sun; ctx.beginPath(); ctx.arc(W*0.78,H*0.12,28,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.25; ctx.beginPath(); ctx.arc(W*0.78,H*0.12,52,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  drawClouds(sx*0.1);
  drawMtns(sx*0.3);
  drawHills(sx*0.5);
}

function drawClouds(ox){
  const cs=[{x:100,y:55,w:120,h:38},{x:350,y:38,w:170,h:48},{x:650,y:65,w:140,h:34},{x:950,y:50,w:160,h:42}];
  ctx.globalAlpha=0.85;
  cs.forEach(c=>{
    const cx=((c.x-ox)%(W+300)+(W+300))%(W+300)-150;
    ctx.fillStyle='rgba(255,255,255,0.92)';
    [[0,0],[-.3,.25],[.3,.25]].forEach(([dx,dy])=>{
      ctx.beginPath(); ctx.ellipse(cx+dx*c.w,c.y+dy*c.h,c.w*(dx?0.4:0.5),c.h*(dx?0.4:0.5),0,0,Math.PI*2); ctx.fill();
    });
  });
  ctx.globalAlpha=1;
}

function drawMtns(ox){
  const pts=[{x:0,h:110},{x:150,h:200},{x:300,h:135},{x:450,h:175},{x:600,h:100},{x:750,h:165},{x:900,h:215},{x:1050,h:125},{x:1200,h:145}];
  const gy=H*0.5;
  ctx.fillStyle='#5a7a9a'; ctx.beginPath(); ctx.moveTo(0,gy);
  pts.forEach(p=>{ const px=((p.x-ox)%1200+1200)%1200; ctx.lineTo(px,gy-p.h); });
  ctx.lineTo(W,gy); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.65)';
  pts.filter(p=>p.h>155).forEach(p=>{
    const px=((p.x-ox)%1200+1200)%1200;
    ctx.beginPath(); ctx.moveTo(px,gy-p.h); ctx.lineTo(px-18,gy-p.h+38); ctx.lineTo(px+18,gy-p.h+38); ctx.closePath(); ctx.fill();
  });
}

function drawHills(ox){
  const gy=H*0.62;
  ['#3a6a32','#2a5a28'].forEach((col,i)=>{
    ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(0,gy+10+i*12);
    for(let x=0;x<=W+100;x+=5){
      const wx=x+ox;
      ctx.lineTo(x,gy+10+i*12+Math.sin(wx*0.004)*28+Math.sin(wx*0.009)*13);
    }
    ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
  });
}

function drawGround(sx){
  const gy=Math.round(H*0.72);
  const off=sx%48;
  // grass top
  fx(0,gy-S,W,3*S,C.grass0); fx(0,gy+2*S,W,2*S,C.grass1);
  // dirt
  ctx.fillStyle='#7a4f2a'; ctx.fillRect(0,gy+4*S,W,H-gy);
  for(let x=-off;x<W+48;x+=48){
    fx(x,gy+6*S,2*S,4*S,C.dirt2); fx(x+24,gy+11*S,3*S,3*S,C.dirt2);
  }
  // grass blades
  for(let x=-off;x<W+48;x+=8){
    const h=3+Math.sin(x*0.5)*2;
    fx(x,gy-S-h,S,h,'#5ab04a'); fx(x+3,gy-S-h+2,S,h-2,'#4a9a3a');
  }
}

class Platform {
  constructor(x,y,w,h,type='rock'){
    this.x=x; this.y=y; this.w=w; this.h=h; this.type=type;
  }
  draw(sx){
    const dx=this.x-sx;
    if(dx+this.w<-50||dx>W+50) return;
    if(this.type==='log'){
      fx(dx,this.y,this.w,this.h,'#6a4a2a'); fx(dx,this.y,this.w,2*S,'#8a6a4a');
      for(let i=0;i<this.w;i+=6*S) fx(dx+i,this.y,2*S,this.h,'#5a3a1a');
    } else {
      fx(dx,this.y,this.w,this.h,'#7a7a8a'); fx(dx,this.y,this.w,2*S,'#9a9aaa');
      fx(dx,this.y+this.h-2*S,this.w,2*S,'#5a5a6a');
    }
  }
  rect(){ return {x:this.x,y:this.y,w:this.w,h:this.h}; }
}

class Collectible {
  constructor(x,y,type='gold'){
    this.x=x; this.y=y; this.type=type; this.collected=false;
    this.frame=rand(0,60);
  }
  update(){ this.frame++; }
  draw(sx){
    if(this.collected) return;
    const dx=this.x-sx;
    if(dx<-30||dx>W+30) return;
    if(this.type==='gold') drawGoldNugget(dx,this.y,this.frame);
    else drawFood(dx,this.y,this.type,this.frame);
  }
  bounds(){ return {x:this.x+2*S,y:this.y,w:8*S,h:8*S}; }
}

class Lawnmower {
  constructor(x,y){ this.x=x; this.y=y; this.vx=-2; this.hp=3; this.frame=0; this.hitT=0; this.stunT=0; this.active=true; this.w=36*S; this.h=22*S; }
  update(px){
    if(!this.active) return;
    this.frame++; this.hitT=Math.max(0,this.hitT-1);
    if(this.stunT>0){ this.stunT--; return; }
    const d=px-this.x;
    this.vx=Math.abs(d)<600 ? (d>0?3:-3) : -1.5;
    this.x+=this.vx;
  }
  draw(sx){
    if(!this.active) return;
    const dx=this.x-sx;
    if(dx<-120||dx>W+120) return;
    if(this.hitT>0) ctx.globalAlpha=0.4+Math.sin(this.hitT*0.5)*0.4;
    drawLawnmower(dx,this.y,this.frame);
    ctx.globalAlpha=1;
    // health bar
    fx(dx,this.y-5*S,this.w,3*S,'#333');
    fx(dx,this.y-5*S,this.w*(this.hp/3),3*S,C.hpG);
  }
  bounds(){ return {x:this.x+2*S,y:this.y+4*S,w:this.w-4*S,h:this.h-4*S}; }
}

class Drone {
  constructor(x,y){ this.x=x; this.y=y; this.baseY=y; this.vx=-2; this.hp=2; this.frame=0; this.hitT=0; this.stunT=0; this.active=true; this.w=20*S; this.h=10*S; this.bombT=120; this.bombs=[]; }
  update(px){
    if(!this.active) return;
    this.frame++; this.hitT=Math.max(0,this.hitT-1);
    if(this.stunT>0){ this.stunT--; return; }
    this.vx=clamp((px-this.x)*0.02,-3,3);
    this.x+=this.vx;
    this.y=this.baseY+Math.sin(this.frame*0.05)*18;
    this.bombT--;
    if(this.bombT<=0){ this.bombs.push({x:this.x+10*S,y:this.y+10*S,vy:0,active:true}); this.bombT=200; }
    this.bombs=this.bombs.filter(b=>b.active&&b.y<H+50);
    this.bombs.forEach(b=>{ b.vy+=0.3; b.y+=b.vy; });
  }
  draw(sx){
    if(!this.active) return;
    const dx=this.x-sx;
    if(dx<-120||dx>W+120) return;
    if(this.hitT>0) ctx.globalAlpha=0.5;
    drawDrone(dx,this.y,this.frame);
    ctx.globalAlpha=1;
    this.bombs.forEach(b=>{ const bx=b.x-sx; fx(bx,b.y,3*S,4*S,'#333'); fx(bx,b.y,3*S,S,'#f44'); });
  }
  bounds(){ return {x:this.x+S,y:this.y,w:this.w,h:this.h}; }
}

const CHARS = [
  {id:'clark', name:'Clark',   ability:'Repair',  col:'#8b3a3a', key:'1'},
  {id:'ellen', name:'Ellen',   ability:'Reveal',  col:'#4a6aa0', key:'2'},
  {id:'rusty', name:'Rusty',   ability:'Sprint',  col:'#c83232', key:'3'},
  {id:'audrey',name:'Audrey',  ability:'Stun',    col:'#9a2a9a', key:'4'},
  {id:'marty', name:'Marty',   ability:'Detect',  col:'#4a8a4a', key:'5'},
];

// ═══════════════════════════════════════════════════════════════
//  PLAYER
// ═══════════════════════════════════════════════════════════════

class Player {
  constructor(x,y){
    this.x=x; this.y=y; this.vx=0; this.vy=0;
    this.onGround=false; this.facing=1; this.frame=0;
    this.charIdx=0; this.hp=100; this.maxHp=100;
    this.score=0; this.gold=0; this.goldNeeded=12;
    this.abilityT=0; this.abilityActive=false;
    this.hitT=0; this.w=18*S; this.h=28*S;
    this.doubleJumped=false;
  }
  get char(){ return CHARS[this.charIdx]; }
  switchTo(i){ this.charIdx=i; }

  update(platforms,level){
    this.frame++; this.hitT=Math.max(0,this.hitT-1); this.abilityT=Math.max(0,this.abilityT-1);

    const spd = (this.charIdx===2 && this.abilityActive) ? 7 : 4;
    if(keys['ArrowLeft']){  this.vx=-spd; this.facing=-1; }
    else if(keys['ArrowRight']){ this.vx=spd; this.facing=1; }
    else this.vx*=0.78;

    if((JP['ArrowUp']||JP['Space'])){
      if(this.onGround){ this.vy=-13; this.onGround=false; this.doubleJumped=false; }
      else if(this.charIdx===2 && !this.doubleJumped){ // Rusty double jump
        this.vy=-11; this.doubleJumped=true;
        burst(this.x+9*S,this.y+28*S,8,[C.gold0,'#fff'],4,20);
      }
    }
    if(JP['KeyZ'] && this.abilityT<=0) this.useAbility(level);

    // char switch
    [0,1,2,3,4].forEach(i=>{ if(JP[`Digit${i+1}`]) this.switchTo(i); });

    this.vy+=0.6; this.x+=this.vx; this.y+=this.vy;
    if(this.x<0) this.x=0;

    const groundY=H*0.72-this.h;
    this.onGround=false;

    if(this.y>=groundY){ this.y=groundY; this.vy=0; this.onGround=true; this.doubleJumped=false; }

    platforms.forEach(p=>{
      const pr=p.rect();
      const pb=this.y+this.h, pr2=pr.y+pr.h, pw=this.x+this.w, pwr=pr.x+pr.w;
      if(pw>pr.x&&this.x<pwr&&pb>pr.y&&this.y<pr2){
        if(this.vy>=0 && pb-this.vy<=pr.y+6){ this.y=pr.y-this.h; this.vy=0; this.onGround=true; this.doubleJumped=false; }
        else if(this.vy<0 && this.y-this.vy>=pr2-6){ this.y=pr2; this.vy=0; }
        else if(this.vx>0 && this.x-this.vx<pr.x){ this.x=pr.x-this.w; this.vx=0; }
        else if(this.vx<0 && this.x-this.vx>pwr){ this.x=pwr; this.vx=0; }
      }
    });
  }

  useAbility(level){
    this.abilityT=180; this.abilityActive=true;
    if(this.charIdx===0) burst(this.x+9*S,this.y+14*S,15,[C.gold0,'#f80','#fff'],5,40);
    if(this.charIdx===1) level.revealGold(this.x);
    if(this.charIdx===3) level.stunEnemies(this.x,this.y);
    if(this.charIdx===4) level.detectGold(this.x);
    setTimeout(()=>this.abilityActive=false,1500);
  }

  hit(dmg){
    if(this.hitT>0) return;
    this.hp-=dmg; this.hitT=60;
    burst(this.x+9*S,this.y+14*S,10,['#f00','#f44','#f88'],3,30);
    shake(5,15);
  }

  draw(sx){
    if(this.hitT>0 && Math.floor(this.hitT/6)%2===0) return;
    drawCharacter(this.char.id, this.x-sx, this.y, this.facing, this.frame);
    if(this.abilityActive){
      ctx.globalAlpha=0.28; ctx.fillStyle=this.char.col;
      ctx.fillRect(this.x-sx-2*S,this.y-2*S,this.w+4*S,this.h+4*S); ctx.globalAlpha=1;
    }
  }
  bounds(){ return {x:this.x+2*S,y:this.y+2*S,w:this.w-4*S,h:this.h-4*S}; }
}

// ═══════════════════════════════════════════════════════════════
//  LEVEL
// ═══════════════════════════════════════════════════════════════

class Level {
  constructor(){
    this.scroll=0; this.length=5200; this.frame=0;
    this.complete=false; this.goalX=4800;
    this.revealT=0; this.detectT=0;
    this.platforms=this.mkPlatforms();
    this.collectibles=this.mkCollectibles();
    this.enemies=this.mkEnemies();
    this.player=new Player(200,300);
    this.wagonX=700; this.wagonY=H*0.72-34*S;
  }

  mkPlatforms(){
    const GY=H*0.72;
    const defs=[
      [500,GY*.86,96,24,'rock'],[700,GY*.75,96,24,'rock'],[900,GY*.83,144,24,'log'],
      [1100,GY*.72,96,24,'rock'],[1300,GY*.80,144,24,'log'],[1500,GY*.69,96,24,'rock'],
      [1800,GY*.77,120,24,'log'],[2100,GY*.72,96,24,'rock'],[2400,GY*.61,144,24,'rock'],
      [2700,GY*.75,120,24,'log'],[3000,GY*.66,96,24,'rock'],[3300,GY*.77,144,24,'log'],
      [3600,GY*.69,96,24,'rock'],[3900,GY*.61,120,24,'rock'],[4200,GY*.72,144,24,'log'],
      [4500,GY*.64,96,24,'rock'],
    ];
    return defs.map(d=>new Platform(...d));
  }

  mkCollectibles(){
    const GY=H*0.72;
    const cols=[];
    const goldXs=[350,450,550,650,750,850,1000,1120,1250,1400,1530,1680,1820,1980,2120,2280,2420,2580,2720,2880,3020,3180,3320,3480,3620,3780,3920,4080,4230,4420];
    goldXs.forEach(gx=>{
      const plat=this.platforms.find(p=>Math.abs(p.x-gx)<120);
      const gy=plat ? plat.y-12*S : GY-16*S;
      cols.push(new Collectible(gx, gy+rand(-12,0), 'gold'));
    });
    [{x:400,t:'hotdog'},{x:800,t:'chips'},{x:1300,t:'cake'},{x:1900,t:'hotdog'},
     {x:2500,t:'chips'},{x:3100,t:'cake'},{x:3700,t:'hotdog'},{x:4300,t:'chips'}].forEach(f=>{
      const plat=this.platforms.find(p=>Math.abs(p.x-f.x)<60);
      const gy2=plat ? plat.y-14*S : GY-18*S;
      cols.push(new Collectible(f.x, gy2, f.t));
    });
    return cols;
  }

  mkEnemies(){
    const GY=H*0.72;
    const es=[];
    [900,1700,2500,3300,4100].forEach(x=>es.push(new Lawnmower(x,GY-22*S)));
    [700,1500,2300,3100,3900,4500].forEach(x=>es.push(new Drone(x,H*0.33)));
    return es;
  }

  revealGold(px){ this.revealT=300; }
  detectGold(px){ this.detectT=200; }
  stunEnemies(px,py){
    this.enemies.forEach(e=>{ if(e.active&&Math.abs(e.x-px)<320){ e.stunT=150; e.hitT=150; } });
    burst(px+9*S,py+14*S,20,['#f0f','#f8f','#fff'],6,50);
  }

  update(){
    this.frame++;
    if(this.revealT>0) this.revealT--;
    if(this.detectT>0) this.detectT--;
    const p=this.player;
    p.update(this.platforms,this);
    this.scroll=clamp(p.x-W*0.35,0,this.length-W);
    this.collectibles.forEach(c=>c.update());

    const pb=p.bounds();
    this.collectibles.forEach(c=>{
      if(c.collected) return;
      if(rectsHit(pb,c.bounds())){
        c.collected=true;
        if(c.type==='gold'){
          const bonus=(p.charIdx===0&&p.abilityActive)?2:1;
          p.gold+=bonus; p.score+=100*bonus;
          burst(c.x-this.scroll,c.y,8,[C.gold0,C.gold1,'#fff'],3,25);
        } else {
          p.hp=Math.min(p.maxHp,p.hp+20);
          burst(c.x-this.scroll,c.y,6,['#f88','#f44','#fff'],2,20);
        }
      }
    });

    this.enemies.forEach(e=>{
      if(!e.active) return;
      e.update(p.x);
      const eb=e.bounds();
      if(rectsHit(pb,eb)){
        if(p.vy>0 && p.y+p.h < e.y+e.h*0.5+10){
          e.hp--; p.vy=-9; p.score+=50;
          e.hitT=30;
          if(e.hp<=0){ e.active=false; p.score+=200; burst(e.x-this.scroll,e.y,15,['#f44','#f80',C.gold0],5,40); shake(8,20); }
        } else p.hit(15);
      }
      if(e instanceof Drone){
        e.bombs.forEach(b=>{
          if(!b.active) return;
          if(rectsHit(pb,{x:b.x,y:b.y,w:3*S,h:4*S})){ b.active=false; p.hit(10); burst(b.x-this.scroll,b.y,8,['#f44','#f80'],3,20); }
        });
      }
    });

    if(p.x>this.goalX || p.gold>=p.goldNeeded) this.complete=true;
    if(p.hp<=0) return 'gameover';
    return this.complete ? 'complete' : 'playing';
  }

  draw(){
    const sx=this.scroll;
    drawSky(sx);
    this.drawBgWagons(sx);
    drawGround(sx);
    this.platforms.forEach(p=>p.draw(sx));
    // wagon
    const wx=this.wagonX-sx;
    if(wx>-100&&wx<W+100) drawWagon(wx,this.wagonY,this.frame);
    // checkpoint
    const gx=this.goalX-sx;
    if(gx>0&&gx<W) this.drawCheckpoint(gx);
    this.collectibles.forEach(c=>c.draw(sx));
    drawParts();
    this.enemies.forEach(e=>e.draw(sx));
    this.player.draw(sx);
    // detect arrow
    if(this.detectT>0){
      const p=this.player;
      const near=this.collectibles.filter(c=>!c.collected&&c.type==='gold').sort((a,b)=>Math.abs(a.x-p.x)-Math.abs(b.x-p.x))[0];
      if(near){
        const dir=near.x>p.x?1:-1;
        const bx=p.x-sx+9*S;
        fx(bx-S,p.y-22*S,2*S,2*S,C.gold0);
        fx(bx-2*S+dir*3*S,p.y-24*S,4*S,2*S,C.gold0);
      }
    }
    this.drawHUD();
  }

  drawBgWagons(sx){
    [1800,3000,4200].forEach(wx=>{
      const dx=wx-sx*0.68;
      if(dx<-100||dx>W+100) return;
      ctx.globalAlpha=0.35;
      fx(dx,H*0.64,80,20,'#4a3a1a'); fx(dx+10,H*0.58,60,20,'#e8d0a0');
      ctx.globalAlpha=1;
    });
  }

  drawCheckpoint(gx){
    const fy=H*0.50, fh=H*0.22;
    fx(gx-40*S,fy,80*S,fh,'#7a5a2a'); fx(gx-35*S,fy+4*S,70*S,fh-8*S,'#8a6a3a');
    for(let i=0;i<7;i++) fx(gx-38*S+i*11*S,fy-4*S,7*S,6*S,'#7a5a2a');
    fx(gx-8*S,fy+10*S,16*S,fh-10*S,'#5a3a1a'); fx(gx-6*S,fy+12*S,12*S,fh-14*S,'#1a0a0a');
    fx(gx-S,fy-16*S,2*S,16*S,'#8a6a3a'); fx(gx+S,fy-15*S,12*S,8*S,'#c83232'); fx(gx+S,fy-13*S,12*S,2*S,'#fff');
    const gl=0.25+Math.sin(this.frame*0.06)*0.18;
    ctx.globalAlpha=gl; fx(gx-50*S,fy-10*S,100*S,fh+20*S,C.gold0); ctx.globalAlpha=1;
    txs('FORT LARAMIE',gx,fy-26*S,14,C.gold0,'#000','center');
    txs('CHECKPOINT',gx,fy-14*S,11,'#fff','#000','center');
  }

  drawHUD(){
    const p=this.player;
    ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,58);

    // health
    txs('HEALTH',12,18,11,'#fff','#000');
    fx(12,22,150,14,'#333');
    const hw=Math.max(0,(p.hp/p.maxHp)*150);
    fx(12,22,hw,14, p.hp>60?C.hpG:p.hp>30?'#e8a800':C.hp);
    fx(12,22,150,2,'rgba(255,255,255,0.25)');
    txs(`${p.hp}`,14,34,9,'#fff');

    // gold
    txs('GOLD',175,18,11,C.gold0,'#000');
    fx(175,22,120,14,'#333');
    fx(175,22,Math.min(1,p.gold/p.goldNeeded)*120,14,C.gold1);
    fx(175,22,120,2,'rgba(255,255,255,0.25)');
    txs(`${p.gold}/${p.goldNeeded}`,177,34,9,C.gold0);

    // score
    txs('SCORE',312,18,11,'#fff','#000');
    txs(String(p.score).padStart(6,'0'),312,36,16,C.gold0,'#000');

    // character portraits
    const portX=W-CHARS.length*50-10;
    CHARS.forEach((c,i)=>{
      const px=portX+i*50;
      const active=i===p.charIdx;
      ctx.fillStyle=active?c.col:'rgba(0,0,0,0.5)';
      ctx.fillRect(px,4,44,48);
      if(active){ ctx.strokeStyle=C.gold0; ctx.lineWidth=2; ctx.strokeRect(px,4,44,48); }
      ctx.save(); ctx.beginPath(); ctx.rect(px+2,6,40,44); ctx.clip();
      drawCharacter(c.id,px+2,0,1,0); ctx.restore();

const LS_KEY='trailBlaed_v1';
function getScores(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||'[]'); }catch(e){ return []; } }
function saveScore(init,score){
  const s=getScores(); s.push({initials:init.toUpperCase().slice(0,3),score});
  s.sort((a,b)=>b.score-a.score);
  const top=s.slice(0,10);
  localStorage.setItem(LS_KEY,JSON.stringify(top));
  return top;
}

// ═══════════════════════════════════════════════════════════════
//  GAME MANAGER
// ═══════════════════════════════════════════════════════════════

const ST = {TITLE:'title',NARR:'narr',PLAY:'play',GAMEOVER:'go',WIN:'win',HSENTRY:'hse',HS:'hs',HTP:'htp'};

class Game {
  constructor(){
    this.state=ST.TITLE;
    this.mi=0;            // menu index
    this.ni=0;            // narrative index
    this.nc=0;            // narrative char select
    this.level=null;
    this.frame=0;
    this.finalScore=0;
    this.hsInit='';
    this.pendingScore=0;
    this.scores=getScores();
  }

  update(){
    this.frame++;
    switch(this.state){
      case ST.TITLE:
        if(JP['ArrowUp'])   this.mi=Math.max(0,this.mi-1);
        if(JP['ArrowDown']) this.mi=Math.min(2,this.mi+1);
        if(JP['Enter']){
          if(this.mi===0){ this.state=ST.NARR; this.ni=0; }
          else if(this.mi===1) this.state=ST.HS;
          else this.state=ST.HTP;
        }
        break;

      case ST.NARR:
        [0,1,2,3,4].forEach(i=>{ if(JP[`Digit${i+1}`]) this.nc=i; });
        if(JP['Enter']){
          if(this.ni<NARRATIVE.length-1) this.ni++;
          else {
            this.level=new Level();
            this.level.player.switchTo(this.nc);
            this.state=ST.PLAY;
          }
        }
        break;

      case ST.PLAY: {
        const r=this.level.update();
        if(r==='gameover'){ this.finalScore=this.level.player.score; this.state=ST.GAMEOVER; }
        else if(r==='complete'){ this.finalScore=this.level.player.score; this.state=ST.WIN; }
        break;
      }

      case ST.GAMEOVER:
        if(JP['Enter']){ this.state=ST.NARR; this.ni=0; this.level=null; }
        break;

      case ST.WIN:
        if(JP['Enter']){ this.pendingScore=this.finalScore; this.hsInit=''; this.state=ST.HSENTRY; }
        break;

      case ST.HSENTRY:
        for(const k in JP){
          if(k.startsWith('Key')&&this.hsInit.length<3) this.hsInit+=k.slice(3);
          if(k==='Backspace'&&this.hsInit.length>0) this.hsInit=this.hsInit.slice(0,-1);
        }
        if(JP['Enter']&&this.hsInit.length>0){
          this.scores=saveScore(this.hsInit,this.pendingScore);
          this.state=ST.HS;
        }
        break;

      case ST.HS:
        if(JP['Enter']) this.state=ST.TITLE;
        break;

      case ST.HTP:
        if(JP['Enter']) this.state=ST.TITLE;
        break;
    }
  }

  draw(){
    let sx=0, sy=0;
    if(shakeT>0){ sx=(Math.random()-.5)*shakeI; sy=(Math.random()-.5)*shakeI; shakeT--; shakeI*=0.84; }
    ctx.save(); ctx.translate(sx,sy);

    switch(this.state){
      case ST.TITLE:    drawTitle(this.mi); break;
      case ST.NARR:     drawNarrative(this.ni,this.nc); break;
      case ST.PLAY:     this.level?.draw(); break;
      case ST.GAMEOVER: this.level?.draw(); drawGameOver(this.finalScore); break;
      case ST.WIN:      this.level?.draw(); drawWinScreen(this.finalScore,this.frame); break;
      case ST.HSENTRY:  drawHighScores(this.scores,this.pendingScore,this.hsInit); break;
      case ST.HS:       drawHighScores(this.scores); break;
      case ST.HTP:      drawHowToPlay(); break;
    }

    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════

const game=new Game();

function loop(){
  ctx.clearRect(0,0,W,H);
  game.update();
  game.draw();
  updateParts();
  clearJP();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
